global:
  scrape_interval: 15s

scrape_configs:
  - job_name: 'kubernetes-nodes'
    static_configs:
      - targets:
        - '10.0.0.92:9100'
        - '10.0.0.194:9100'
        - '10.0.0.204:9100'
        - '10.0.0.55:9100'
        - '10.0.0.96:9100'

  - job_name: 'kube-state-metrics'
    static_configs:
      - targets:
        - '10.0.0.92:30523'
        - '10.0.0.194:30523'
        - '10.0.0.204:30523'
        - '10.0.0.55:30523'
        - '10.0.0.96:30523'

  - job_name: 'kubernetes-cadvisor'
    scheme: https
    tls_config:
      cert_file: /etc/prometheus/certs/client.crt
      key_file: /etc/prometheus/certs/client.key
      insecure_skip_verify: true
    static_configs:
      - targets:
        - '10.0.0.92:10250'
        - '10.0.0.194:10250'
        - '10.0.0.204:10250'
        - '10.0.0.55:10250'
        - '10.0.0.96:10250'
    metrics_path: /metrics/cadvisor
