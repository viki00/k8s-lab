---
- name: Configure nodes to use local CoreDNS
  hosts: vik_nodes
  become: yes
  tasks:
    - name: Configure systemd-resolved to use 10.0.0.44 as DNS
      lineinfile:
        path: /etc/systemd/resolved.conf
        regexp: '^#?DNS='
        line: 'DNS=10.0.0.44'
      notify: restart systemd-resolved

    - name: Configure systemd-resolved to use 8.8.8.8 as FallbackDNS
      lineinfile:
        path: /etc/systemd/resolved.conf
        regexp: '^#?FallbackDNS='
        line: 'FallbackDNS=8.8.8.8 8.8.4.4'
      notify: restart systemd-resolved

    - name: Ensure Domains is set for .lab
      lineinfile:
        path: /etc/systemd/resolved.conf
        regexp: '^#?Domains='
        line: 'Domains=lab'
      notify: restart systemd-resolved

  handlers:
    - name: restart systemd-resolved
      systemd:
        name: systemd-resolved
        state: restarted
